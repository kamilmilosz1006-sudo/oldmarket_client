name: Build Radio APK

on:
  push:
    branches: [ "main" ]
    paths:
      - 'radio/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: radio

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Generate wrapper
        run: gradle wrapper --gradle-version 8.0

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DRUN-FM-Radio-APK
          path: radio/app/build/outputs/apk/release/app-release.apk
