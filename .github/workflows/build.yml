name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle & create project
        run: |
          # Install Gradle
          SDKMAN_DIR="$HOME/.sdkman"
          curl -s "https://get.sdkman.io" | bash
          source "$SDKMAN_DIR/bin/sdkman-init.sh"
          sdk install gradle 8.2

          mkdir -p app/src/main/java app/src/main/res app/src/main/libs
          cp -r src/* app/src/main/java/
          cp -r res/* app/src/main/res/
          if [ -d libs ]; then cp -r libs/* app/src/main/libs/; fi
          cp AndroidManifest.xml app/src/main/
          # Rename .9.png to .png to avoid aapt2 9-patch issues
          find app/src/main/res -name "*.9.png" -exec bash -c 'mv "$1" "${1%.9.png}.png"' _ {} \;

      - name: Create build files
        run: |
          SDKMAN_DIR="$HOME/.sdkman"
          source "$SDKMAN_DIR/bin/sdkman-init.sh"

          cat > settings.gradle << 'SEOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "OldMarket"
          include ':app'
          SEOF

          cat > build.gradle << 'BEOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          BEOF

          cat > app/build.gradle << 'AEOF'
          apply plugin: 'com.android.application'

          android {
              compileSdk 33
              buildToolsVersion "34.0.0"
              namespace "com.oldmarket"

              defaultConfig {
                  applicationId "com.oldmarket"
                  minSdk 7
                  targetSdk 14
                  versionCode 13
                  versionName "2.4"
              }

              sourceSets {
                  main {
                      manifest.srcFile 'src/main/AndroidManifest.xml'
                      java.srcDirs = ['src/main/java']
                      res.srcDirs = ['src/main/res']
                      jniLibs.srcDirs = ['src/main/libs']
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_7
                  targetCompatibility JavaVersion.VERSION_1_7
              }

              aaptOptions {
                  cruncherEnabled false
              }
          }

          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
          }
          AEOF

          cat > gradle.properties << 'PEOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=false
          android.enableJetifier=false
          PEOF

          # Generate gradle wrapper
          gradle wrapper --gradle-version 8.2

      - name: Build APK
        run: |
          SDKMAN_DIR="$HOME/.sdkman"
          source "$SDKMAN_DIR/bin/sdkman-init.sh"
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OldMarket-APK
          path: app/build/outputs/apk/debug/*.apk
